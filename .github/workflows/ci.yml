---
# Aviation Knowledge Base MVP — CI (Phase 3 active)
#
# Phase 1 shipped this workflow with stub schema-validation and link-check
# jobs. Phase 3 replaces them with real validators (per VAL-05):
#   - schema-validation-stub  -> validate (runs scripts/validate.py)
#   - link-check-stub         -> test     (runs pytest)
#
# Action versions pinned per .planning/research/STACK.md and
# .planning/research/PITFALLS.md guidance. NEVER use floating refs (e.g. the
# rolling "latest" tag or unstable branch references) — supply chain risk +
# reproducibility.
#
# This workflow is the gate referenced in .planning/research/ARCHITECTURE.md
# "Validation & CI Layer". Phase 3 makes it actually validate; Phase 1 wired it.

name: CI

on:  # yamllint disable-line rule:truthy
  push: {branches: [main]}
  pull_request: {branches: [main]}

# Cancel duplicate in-flight runs on the same ref (saves CI budget).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Note: lfs: false intentionally — Phase 1 has no LFS objects yet.
          # Switch to lfs: true once the first PDF lands in docs/ (Phase 4).

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Note: no cache: pip on the lint job — pre-commit hook envs are
          # cached separately below via actions/cache. The validate/test jobs
          # do use cache: pip keyed on requirements-dev.txt.

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit==3.7.1

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  validate:
    name: Schema + provenance + link validation (Phase 3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run master validator on instances/ (production tree)
        # Phase 3 ships with instances/ empty by design — validate.py exits 0
        # on an empty walk. Phase 4+ will populate this tree, at which point
        # this step becomes the production-data merge gate.
        run: python scripts/validate.py instances/

      - name: Run master validator on tests/fixtures/valid/ (corpus self-check)
        # The valid fixture corpus must stay clean as schemas evolve. If a
        # Phase-N schema change breaks a Phase-(N-1) fixture, this step fails
        # and the PR author has to update either the schema or the fixture.
        run: python scripts/validate.py tests/fixtures/valid/

  test:
    name: Pytest (validator regression suite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        # `-q --tb=short` keeps CI logs scannable. The validator + mutation
        # suites under tests/ are the regression net for every rule shipped
        # by Phase 3 plans 03-01..03-05.
        run: pytest -q --tb=short
