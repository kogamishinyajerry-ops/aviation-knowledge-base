--- # YAML document start
# Aviation Knowledge Base MVP — pre-commit configuration
# Per REPO-05: minimum hooks include yamllint, check-jsonschema,
# check-merge-conflict, end-of-file-fixer.
#
# Tool versions pinned per .planning/research/STACK.md:
#   - pre-commit framework: 3.7+
#   - yamllint: 1.38+
#   - check-jsonschema: 0.37.1
#
# Hook revisions below are pinned to specific upstream tags; bump only
# via deliberate PR with CHANGELOG entry.
#
# Initial setup (one-time, on each developer machine):
#   pip install pre-commit==3.7.1
#   pre-commit install
#
# Run on demand:
#   pre-commit run --all-files

minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]  # 1 MB; binaries should be in LFS, see .gitattributes
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]  # respect Markdown 2-space line breaks
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        # NOTE: deliberately NO strict-mode flag here. We rely on level-based
        # gating defined in .yamllint:
        #   - level error   blocks commit (trailing-spaces, missing-newline-at-EOF,
        #                   document-start, key-duplicates default, indentation)
        #   - level warning is informational only (line-length up to 200 chars)
        # Why this matters: Phase 2+ entity records will have long bilingual
        # `full_text` / regulation-quote fields. Promoting warnings to failures
        # would block legitimate aviation content. The relaxed-but-meaningful
        # gate is exactly what makes pre-commit usable on this corpus.
        # Re-evaluate strictness in Phase 2 once the first schemas land and
        # we have empirical data on how often warnings fire.
        # See .planning/phases/01-repo-skeleton-git-baseline-prd-v0/01-03-PLAN.md
        # acceptance criteria: yamllint hook intentionally has no strict flag.
        args: ["-c", ".yamllint"]
        # Phase 3 plan 03-06: exclude `tests/fixtures/invalid/` from yamllint.
        # These fixtures intentionally violate ontology rules and some also
        # ship without `--- # YAML document start`. They are loaded directly
        # by pytest (tests/test_validators.py, tests/test_mutations.py) and
        # are explicitly excluded from `validate.py`'s walk by
        # `scripts/validators/loader.py:iter_instance_files`. yamllint is a
        # style gate for human-authored corpus YAML, not for these
        # adversarial test artifacts.
        exclude: '^tests/fixtures/invalid/'

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      # Phase 1 stub: no schemas exist yet under ontology/schemas/.
      # We pre-wire the hook so that when Phase 2 adds schemas, this is
      # already configured. Until then, the hook runs against the (empty)
      # `files: ` pattern and trivially passes.
      #
      # Phase 2 will replace `files:` with patterns matching:
      #   - ontology/schemas/**/*.json   (validate against JSON Schema metaschema)
      #   - instances/entities/**/*.yaml (validate against per-type schema)
      #   - instances/relations/**/*.yaml
      #
      # For Phase 1, we configure metaschema validation only — it self-validates
      # any future JSON Schema file we drop into ontology/schemas/.
      - id: check-jsonschema
        name: "check-jsonschema (metaschema, Phase 1 stub)"
        files: '^ontology/schemas/.*\.json$'
        args: ["--check-metaschema"]
        # If no files match, the hook is skipped (pre-commit default).
        # This is intentional for Phase 1 — Phase 2 lands the first schemas.

  # ----------------------------------------------------------------
  # Phase 3 (VAL-05): local hook running scripts/validate.py for
  # fast contributor feedback. The CI workflow (.github/workflows/ci.yml)
  # is the authoritative gate; this hook is best-effort for local dev.
  # Contributors must one-time install: pip install -r requirements-dev.txt
  # ----------------------------------------------------------------
  - repo: local
    hooks:
      - id: aviation-validate
        name: "aviation-validate (Phase 3 master validator)"
        # Run the Python master validator on the canonical instance tree
        # AND the curated valid fixture corpus. Cross-record validators
        # (relations, links) need the full corpus index to be meaningful,
        # so we always pass the directories — not the individual staged files.
        entry: python scripts/validate.py instances/ tests/fixtures/valid/
        language: system
        # `language: system` rationale: pre-commit's managed `language: python`
        # creates an isolated venv per hook env, but our validator imports
        # from `scripts/validators/` (a path-relative package) which makes
        # the import path brittle inside an isolated env. `system` runs in
        # the contributor's existing shell where they have already done the
        # one-time `pip install -r requirements-dev.txt`. See
        # scripts/validators/README.md for setup instructions.
        pass_filenames: false
        # Trigger only when YAML records or validator code changes; passing
        # `pass_filenames: false` because validate.py walks directories itself.
        files: '^(instances/|tests/fixtures/valid/|scripts/validators/|scripts/validate\.py$|ontology/schemas/|ontology/_meta\.schema\.json$).*'

# CI integration note (.github/workflows/ci.yml — Phase 3 plan 03-06 owns):
# The CI workflow runs `pre-commit run --all-files` against every PR
# (lint job) PLUS the dedicated validate + test jobs that re-run
# scripts/validate.py and pytest in CI. Local developer machines run
# only the hooks for staged files via the pre-commit Git hook
# (`pre-commit install`).
