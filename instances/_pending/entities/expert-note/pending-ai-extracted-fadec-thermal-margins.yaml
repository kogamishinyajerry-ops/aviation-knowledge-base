content_md: |
  AI-extracted draft from FAR §25.1309 + AC 25.1309-1A combined reading
  (Claude Opus 4.7, 2026-05-02): FADEC thermal margins must accommodate the
  full operating envelope including:
  - hot-day takeoff at maximum gross weight (cabin / cockpit ambient up to +70°C)
  - cold soak following polar overnight stop (operating temperature down to -55°C)
  - in-flight engine-bay temperature transients during go-around / takeoff power
  Reviewer note: original AI extraction missed the engine-bay transient case;
  reviewer added it after cross-checking AC 25.1309-1A §7.b on environmental
  qualification.
