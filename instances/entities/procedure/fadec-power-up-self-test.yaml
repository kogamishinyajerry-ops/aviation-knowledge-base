steps:
  - step_number: 1
    instruction: "Apply battery bus power; observe FADEC channel A and B BIT pass within 8 seconds."
  - step_number: 2
    instruction: "Verify EICAS shows no FADEC fault messages."
  - step_number: 3
    instruction: "Command throttle to idle and observe smooth fuel-metering response on test bench."
  - step_number: 4
    instruction: "Command throttle to TO/GA and verify no thrust-transient overshoot exceeds ±2%."
    hazards:
      - "Inadvertent throttle command may cause unexpected engine spool-up — confirm area is clear of personnel and FOD before this step."
  - step_number: 5
    instruction: "Return throttle to idle and command engine cutoff; verify clean shutdown."
prerequisites:
  - "BITE check passed within last 30 days"
  - "Engine cooled to ambient"
