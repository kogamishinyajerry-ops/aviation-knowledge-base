    en: "Bilingual demo — Expert note on FADEC channel-arbitration mechanism"
  full_text:
    zh: |
      在双通道 FADEC 架构中，通道仲裁机制 (cross-channel arbitration) 是确保
      单通道失效时能够无中断切换至另一通道的关键。仲裁判据通常包括：
      1. 心跳信号丢失 (heartbeat-loss) — 超过 50 ms 未收到对方通道心跳；
      2. 关键传感器一致性偏差 — 例如发动机转速指示偏差超过额定值的 1%；
      3. 自检失败标志 (BITE-fail flag)。
      工程实践中，仲裁逻辑必须避免"翻转抖动" (toggle thrash)：一旦切换通道，
      必须有最少 2 秒的"锁定窗口"才允许下一次切换决策。
    en: |
      In a dual-channel FADEC architecture, the cross-channel arbitration
      mechanism is the key to ensuring uninterrupted handover from a failed
      channel to its peer. Arbitration criteria typically include:
      1. Heartbeat loss — peer channel heartbeat absent for >50 ms;
      2. Critical-sensor consistency divergence — e.g. N1 indication deviating
         by more than 1% of nominal between the two channels;
      3. BITE-fail flag.
      In engineering practice, the arbitration logic must avoid "toggle
      thrash": once the system has switched channels, a minimum 2-second
      "lock window" is required before another switch decision is allowed.
