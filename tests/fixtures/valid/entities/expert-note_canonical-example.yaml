topic: "far-25-1309-failure-condition-severity-assessment"
content_md: |
  When applying FAR 25.1309(b)(1), the failure condition severity is
  determined by the inverse relationship between probability of occurrence
  and consequence severity. A catastrophic failure must be extremely
  improbable (≤1e-9 per flight hour); hazardous must be extremely remote
  (≤1e-7); major must be remote (≤1e-5). Practitioners frequently conflate
  "extremely improbable" with "extremely remote" — the former is two orders
  of magnitude stricter and applies only to catastrophic conditions.
